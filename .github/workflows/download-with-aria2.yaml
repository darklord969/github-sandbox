name: Download via Commit Message

on:
  push:
    branches:
      - main

jobs:
  download:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Get commit message
        id: commit
        run: |
          echo "message<<EOF" >> $GITHUB_OUTPUT
          git log -1 --pretty=%B >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Extract URLs
        id: extract
        run: |
          msg="${{ steps.commit.outputs.message }}"
          
          if [[ "$msg" =~ download:\ (.*) ]]; then
            echo "urls=${BASH_REMATCH[1]}" >> $GITHUB_OUTPUT
          else
            echo "No download command found"
            exit 0
          fi

      - name: Install aria2
        run: sudo apt-get update && sudo apt-get install -y aria2

      - name: Download files (Advanced Organized)
        run: |
          mkdir -p downloads

          URLS="${{ steps.extract.outputs.urls }}"

          for url in $URLS; do
            filename=$(basename "$url" | cut -d '?' -f1)

            # حذف کاراکترهای اضافی
            clean_name=$(echo "$filename" | sed 's/[^a-zA-Z0-9._-]/_/g')

            folder="downloads/${clean_name%.*}"
            mkdir -p "$folder"

            echo "⬇️ Downloading: $clean_name"

            aria2c -x 16 -s 16 -k 1M \
              --dir="$folder" \
              --out="$clean_name" \
              "$url"

            echo "📄 Creating info file..."

            echo "Original URL: $url" > "$folder/info.txt"
            echo "Saved as: $clean_name" >> "$folder/info.txt"
            echo "Date: $(date)" >> "$folder/info.txt"

          done

      - name: Commit and push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git add downloads/
          git commit -m "📥 downloaded files [skip ci]" || echo "Nothing to commit"
          git push
