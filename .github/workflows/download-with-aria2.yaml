name: Download from Commit & Save to Repo (Improved)

on:
  push:
    branches:
      - "**"

jobs:
  save-file:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install aria2 and 7z
        run: sudo apt-get update && sudo apt-get install -y aria2 p7zip-full

      - name: Extract URLs and download files
        run: |
          MSG=$(git log -1 --pretty=%B)
          echo "Commit message: $MSG"

          if echo "$MSG" | grep -qP 'download-zip:'; then
            MODE="zip"
            URL_LINE=$(echo "$MSG" | grep -oP 'download-zip:\s*\K.*')
          elif echo "$MSG" | grep -qP 'download:'; then
            MODE="normal"
            URL_LINE=$(echo "$MSG" | grep -oP 'download:\s*\K.*')
          else
            echo "❌ No download command found in commit message"
            exit 0
          fi

          echo "Mode: $MODE"
          mkdir -p downloads tmp_downloads

          for URL in $URL_LINE; do
            FILENAME=$(basename "$URL")
            echo "⬇️ Downloading $URL -> $FILENAME"

            aria2c --split=2 --max-connection-per-server=2 --min-split-size=90M \
              --out="$FILENAME" --dir="tmp_downloads" "$URL" || continue

            # ساخت پوشه به اسم فایل اصلی
            FOLDER_NAME="${FILENAME}"
            mkdir -p "downloads/${FOLDER_NAME}"

            FILE_SIZE=$(stat -c%s "tmp_downloads/$FILENAME" 2>/dev/null || echo 0)

            if [ "$FILE_SIZE" -gt $((95 * 1024 * 1024)) ]; then
              echo "✂️ Splitting $FILENAME into 95MB parts with 7z..."
              cd "tmp_downloads"
              7z a -v95m "../downloads/${FOLDER_NAME}/${FILENAME}.7z" "$FILENAME"
              cd ..
            else
              mv "tmp_downloads/$FILENAME" "downloads/${FOLDER_NAME}/"
            fi

            # ایجاد فایل راهنما جوین کردن
            cat > "downloads/${FOLDER_NAME}/HOW_TO_JOIN.txt" << 'EOF'
====================================
چگونه فایل را جوین کنیم (روی ویندوز)

1. همه فایل‌های داخل این پوشه را دانلود کنید.

2. برنامه 7-Zip را نصب کنید:
   https://www.7-zip.org/

3. روی فایل اول (معمولاً فایل.7z.001) راست کلیک کنید → 
   7-Zip → "Extract Here"

روش جایگزین با Command Prompt (cmd):

copy /B "*.7z.001" + "*.7z.002" + "*.7z.003" + ... "فایل_اصلی.7z"

بعد از جوین، فایل اصلی آماده استفاده است.
====================================
EOF

          done

          rm -rf tmp_downloads

      - name: Commit & Push
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add downloads/
          git commit -m "Add downloaded files from commit [skip ci]" || echo "Nothing to commit"
          git push origin HEAD:${GITHUB_REF_NAME}
